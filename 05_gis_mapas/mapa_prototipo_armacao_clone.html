<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa Prototipo Armacao - Clone Operacional</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <style>
        :root {
            --bg: #f2f6f7;
            --panel: #ffffff;
            --line: #cfdae0;
            --text: #102a43;
            --muted: #627d98;
            --accent: #006d77;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 360px;
            height: 100vh;
        }

        .map-wrap {
            position: relative;
            min-height: 60vh;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .map-title {
            position: absolute;
            z-index: 1000;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 14px;
            width: min(94%, 580px);
            text-align: center;
            box-shadow: 0 4px 14px rgba(16, 42, 67, 0.16);
        }

        .map-title h1 {
            margin: 0;
            font-size: 1.15rem;
        }

        .map-title p {
            margin: 4px 0 0;
            font-size: 0.82rem;
            color: var(--muted);
        }

        .compass {
            position: absolute;
            z-index: 1000;
            top: 88px;
            left: 12px;
            width: 92px;
            height: 92px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid var(--line);
            display: grid;
            place-items: center;
            box-shadow: 0 4px 14px rgba(16, 42, 67, 0.12);
        }

        .compass svg {
            width: 80px;
            height: 80px;
            display: block;
        }

        .legend {
            position: absolute;
            z-index: 1000;
            right: 12px;
            bottom: 12px;
            background: rgba(255, 255, 255, 0.93);
            border: 1px solid var(--line);
            border-radius: 9px;
            padding: 10px;
            width: 220px;
            font-size: 0.78rem;
            box-shadow: 0 4px 12px rgba(16, 42, 67, 0.12);
        }

        .legend strong { display: block; margin-bottom: 6px; }
        .legend-row { display: flex; align-items: center; gap: 8px; margin: 5px 0; }

        .swatch {
            width: 12px;
            height: 12px;
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.25);
            flex-shrink: 0;
        }

        aside {
            background: var(--panel);
            border-left: 2px solid var(--line);
            overflow-y: auto;
        }

        .panel-head {
            padding: 16px;
            background: linear-gradient(135deg, #006d77, #2a9d8f);
            color: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .panel-head h2 { margin: 0 0 6px; font-size: 1.1rem; }
        .panel-head p { margin: 0; font-size: 0.82rem; opacity: 0.92; }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 12px;
            border-bottom: 1px solid var(--line);
            background: #f7fbfa;
        }

        .stat {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            padding: 8px;
            text-align: center;
        }

        .stat b {
            display: block;
            color: var(--accent);
            font-size: 1.2rem;
        }

        .filter {
            padding: 12px;
            border-bottom: 1px solid var(--line);
        }

        .layer-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 6px 0;
            font-size: 0.88rem;
        }

        .station-list {
            padding: 10px 12px 16px;
        }

        .station {
            border: 1px solid var(--line);
            border-left: 4px solid var(--accent);
            border-radius: 8px;
            background: #fff;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .station:hover {
            background: #f4fbfb;
        }

        .station.selected {
            background: #e6f6f4;
            border-left-color: #d72638;
            box-shadow: 0 0 0 2px rgba(215, 38, 56, 0.18);
        }

        .station h4 {
            margin: 0 0 4px;
            font-size: 0.95rem;
            color: var(--accent);
        }

        .station p {
            margin: 0;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .point-tooltip {
            background: rgba(16, 42, 67, 0.94);
            color: #fff;
            border: 0;
            border-radius: 6px;
            box-shadow: 0 4px 12px rgba(16, 42, 67, 0.22);
            font-size: 0.8rem;
            font-weight: 600;
            padding: 4px 8px;
        }

        .point-tooltip.leaflet-tooltip-top:before {
            border-top-color: rgba(16, 42, 67, 0.94);
        }

        .flag-marker {
            position: relative;
            width: 18px;
            height: 22px;
        }

        .flag-marker .base {
            position: absolute;
            left: 2px;
            bottom: 0;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid #0f172a;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.25);
        }

        .flag-marker .pole {
            position: absolute;
            left: 8px;
            bottom: 12px;
            width: 2px;
            height: 10px;
            background: #334155;
            border-radius: 2px;
        }

        .flag-marker .flag {
            position: absolute;
            left: 10px;
            bottom: 18px;
            font-size: 10px;
            line-height: 1;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
        }

        .controls {
            padding: 10px 12px 16px;
            border-top: 1px solid var(--line);
            position: sticky;
            bottom: 0;
            background: #fff;
        }

        button {
            width: 100%;
            margin-top: 6px;
            border: none;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            font-weight: 600;
            background: #006d77;
            color: #fff;
        }

        @media (max-width: 980px) {
            .layout {
                grid-template-columns: 1fr;
            }

            aside {
                height: 50vh;
                border-left: none;
                border-top: 2px solid var(--line);
            }
        }
    </style>
</head>
<body>
<div class="layout">
    <section class="map-wrap">
        <div class="map-title">
            <h1>Mapa Operacional - Prototipo Armacao</h1>
            <p>Pontos de campo por camada metodologica (clone funcional do mapa de referencia)</p>
        </div>
        <div class="compass" aria-label="Rosa dos ventos">
            <svg viewBox="0 0 100 100" role="img" aria-hidden="true">
                <circle cx="50" cy="50" r="43" fill="#fff" stroke="#7b8794" stroke-width="2" />
                <polygon points="50,8 57,42 50,36 43,42" fill="#d72638" />
                <polygon points="50,92 57,58 50,64 43,58" fill="#7b8794" />
                <polygon points="8,50 42,57 36,50 42,43" fill="#7b8794" />
                <polygon points="92,50 58,57 64,50 58,43" fill="#7b8794" />
                <circle cx="50" cy="50" r="4" fill="#334155" />
                <text x="50" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#d72638">N</text>
                <text x="50" y="96" text-anchor="middle" font-size="10" fill="#475569">S</text>
                <text x="12" y="54" text-anchor="middle" font-size="10" fill="#475569">W</text>
                <text x="88" y="54" text-anchor="middle" font-size="10" fill="#475569">E</text>
            </svg>
        </div>
        <div id="map"></div>
        <div class="legend" id="legend"></div>
    </section>

    <aside>
        <div class="panel-head">
            <h2>Camadas do Prototipo</h2>
            <p>Ative/desative as referencias por procedimento.</p>
        </div>

        <div class="stats">
            <div class="stat"><b id="nStations">0</b>Pontos unicos</div>
            <div class="stat"><b id="nRecords">0</b>Registros</div>
            <div class="stat"><b id="nLayers">0</b>Camadas</div>
            <div class="stat"><b id="nVisible">0</b>Visiveis</div>
        </div>

        <div class="filter">
            <strong>Base layers</strong>
            <p style="margin:6px 0 0;font-size:0.82rem;color:var(--muted);">Mapa OSM, relevo e satelite para leitura do local.</p>
        </div>

        <div class="filter" id="layerFilter"></div>
        <div class="station-list" id="stationList"></div>

        <div class="controls">
            <button type="button" onclick="resetMap()">Resetar visao</button>
            <button type="button" onclick="toggleAll(true)">Ativar tudo</button>
            <button type="button" onclick="toggleAll(false)">Desativar tudo</button>
        </div>
    </aside>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const CSV_URL = "../04_dados_campo/raw/referencias_prototipo_armacao.csv";
const FALLBACK_CSV = `name,lat,lon,layer
Ponta das Campanhas,-27.749367,-48.499284,quadrat_photo
Ponto 1,-27.750445,-48.500327,quadrat_photo
Ponto 2,-27.749546,-48.500338,quadrat_photo
Ponto 3,-27.748517,-48.498916,quadrat_photo
Ponto 4,-27.747794,-48.499240,quadrat_photo
Ilha de Fora,-27.747719,-48.498424,quadrat_photo
Ponta das Campanhas,-27.749367,-48.499284,water_sample_lab
Ponto 1,-27.750445,-48.500327,water_sample_lab
Ponto 2,-27.749546,-48.500338,water_sample_lab
Ponto 3,-27.748517,-48.498916,water_sample_lab
Ponto 4,-27.747794,-48.499240,water_sample_lab
Ilha de Fora,-27.747719,-48.498424,water_sample_lab
Ponta das Campanhas,-27.749367,-48.499284,water_probe
Ponto 1,-27.750445,-48.500327,water_probe
Ponto 2,-27.749546,-48.500338,water_probe
Ponto 3,-27.748517,-48.498916,water_probe
Ponto 4,-27.747794,-48.499240,water_probe
Ilha de Fora,-27.747719,-48.498424,water_probe
Ponta das Campanhas,-27.749367,-48.499284,secchi
Ponto 1,-27.750445,-48.500327,secchi
Ponto 2,-27.749546,-48.500338,secchi
Ponto 3,-27.748517,-48.498916,secchi
Ponto 4,-27.747794,-48.499240,secchi
Ilha de Fora,-27.747719,-48.498424,secchi
Ponta das Campanhas,-27.749367,-48.499284,drone
Ponto 1,-27.750445,-48.500327,drone
Ponto 2,-27.749546,-48.500338,drone
Ponto 3,-27.748517,-48.498916,drone
Ponto 4,-27.747794,-48.499240,drone
Ilha de Fora,-27.747719,-48.498424,drone
Ponta das Campanhas,-27.749367,-48.499284,algae_collect_taxonomy
Ponto 1,-27.750445,-48.500327,algae_collect_taxonomy
Ponto 2,-27.749546,-48.500338,algae_collect_taxonomy
Ponto 3,-27.748517,-48.498916,algae_collect_taxonomy
Ponto 4,-27.747794,-48.499240,algae_collect_taxonomy
Ilha de Fora,-27.747719,-48.498424,algae_collect_taxonomy
Ponta das Campanhas,-27.749367,-48.499284,algae_photo_in_situ
Ponto 1,-27.750445,-48.500327,algae_photo_in_situ
Ponto 2,-27.749546,-48.500338,algae_photo_in_situ
Ponto 3,-27.748517,-48.498916,algae_photo_in_situ
Ponto 4,-27.747794,-48.499240,algae_photo_in_situ
Ilha de Fora,-27.747719,-48.498424,algae_photo_in_situ`;
const MAP_BOUNDS = [
    [-27.7539, -48.5027],
    [-27.7453, -48.4964]
];
const INITIAL_CENTER = [-27.7493, -48.4993];
const INITIAL_ZOOM = 17;
const MIN_ZOOM = 14;
const MAX_ZOOM = 19;

const LAYER_COLORS = {
    quadrat_photo: "#0ea5e9",
    water_sample_lab: "#2563eb",
    water_probe: "#14b8a6",
    secchi: "#f59e0b",
    drone: "#ef4444",
    algae_collect_taxonomy: "#7c3aed",
    algae_photo_in_situ: "#22c55e"
};

const LAYER_LABELS = {
    quadrat_photo: "Quadrat Photo",
    water_sample_lab: "Water Sample Lab",
    water_probe: "Water Probe",
    secchi: "Secchi",
    drone: "Drone",
    algae_collect_taxonomy: "Algae Collect Taxonomy",
    algae_photo_in_situ: "Algae Photo In Situ"
};

const map = L.map("map", {
    zoomControl: true,
    minZoom: MIN_ZOOM,
    maxZoom: MAX_ZOOM,
    maxBounds: MAP_BOUNDS,
    maxBoundsViscosity: 0.95
}).setView(INITIAL_CENTER, INITIAL_ZOOM);

const osmLayer = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "© OpenStreetMap contributors"
});

const satelliteLayer = L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
    {
        maxZoom: 19,
        attribution: "Tiles © Esri"
    }
);

osmLayer.addTo(map);

L.control.layers(
    {
        "Mapa OSM": osmLayer,
        "Satélite": satelliteLayer
    },
    null,
    { position: "topright", collapsed: false }
).addTo(map);

L.control.scale({ metric: true, imperial: false, position: "bottomleft" }).addTo(map);

const groups = {};
const allBounds = [];
let DATA = [];
const DEFAULT_LAYER = "quadrat_photo";
const referenceDataByName = {};
let activeReferenceMarker = null;
let selectedReferenceName = null;

Object.keys(LAYER_COLORS).forEach((layer) => {
    groups[layer] = L.layerGroup();
    if (layer === DEFAULT_LAYER) {
        groups[layer].addTo(map);
    }
});

function parseCsv(text) {
    const lines = text.trim().split(/\r?\n/);
    const rows = [];

    for (let i = 1; i < lines.length; i += 1) {
        const [name, lat, lon, layer] = lines[i].split(",");
        if (!name || !lat || !lon || !layer) continue;
        rows.push({
            name: name.trim(),
            lat: Number(lat),
            lon: Number(lon),
            layer: layer.trim()
        });
    }

    return rows.filter((row) => Number.isFinite(row.lat) && Number.isFinite(row.lon));
}

function clearLayers() {
    Object.values(groups).forEach((group) => group.clearLayers());
    Object.keys(referenceDataByName).forEach((key) => delete referenceDataByName[key]);
    if (activeReferenceMarker) {
        map.removeLayer(activeReferenceMarker);
        activeReferenceMarker = null;
    }
    allBounds.length = 0;
}

function showReferencePoint(name) {
    const ref = referenceDataByName[name];
    if (!ref) return;

    if (activeReferenceMarker) {
        map.removeLayer(activeReferenceMarker);
    }

    activeReferenceMarker = L.marker([ref.lat, ref.lon], {
        icon: createFlagIcon("#d72638"),
        keyboard: true,
        zIndexOffset: 1200
    });

    activeReferenceMarker.bindPopup(`
        <div style="font-family:Segoe UI,Tahoma,sans-serif;line-height:1.45;">
            <strong>🚩 ${ref.name}</strong><br>
            Tipo: Ponto de referência<br>
            Lat: ${ref.lat.toFixed(6)}<br>
            Lon: ${ref.lon.toFixed(6)}
        </div>
    `);

    activeReferenceMarker.addTo(map);
    activeReferenceMarker.openPopup();
}

function createFlagIcon(color) {
    const safeColor = color || "#334155";
    return L.divIcon({
        className: "",
        html: `<div class="flag-marker"><span class="base" style="background:${safeColor};"></span><span class="pole"></span><span class="flag">🚩</span></div>`,
        iconSize: [18, 22],
        iconAnchor: [9, 21],
        popupAnchor: [0, -16],
        tooltipAnchor: [0, -20]
    });
}

function populateMap(records) {
    clearLayers();
    DATA = records;

    DATA.forEach((rec) => {
        if (!groups[rec.layer]) return;

        const color = LAYER_COLORS[rec.layer] || "#334155";
        const marker = L.circleMarker([rec.lat, rec.lon], {
            radius: 7,
            fillColor: color,
            color: "#0f172a",
            weight: 1,
            fillOpacity: 0.85
        });

        marker.bindPopup(`
            <div style="font-family:Segoe UI,Tahoma,sans-serif;line-height:1.45;">
                <strong>${rec.name}</strong><br>
                Camada: ${LAYER_LABELS[rec.layer] || rec.layer}<br>
                Lat: ${rec.lat.toFixed(6)}<br>
                Lon: ${rec.lon.toFixed(6)}
            </div>
        `);

        marker.bindTooltip(`${rec.name} • ${LAYER_LABELS[rec.layer] || rec.layer}`, {
            permanent: false,
            direction: "top",
            offset: [0, -10],
            opacity: 0.95,
            className: "point-tooltip"
        });

        marker.on("click", () => {
            marker.openPopup();
            marker.openTooltip();
        });

        marker.addTo(groups[rec.layer]);
        allBounds.push([rec.lat, rec.lon]);

        if (!referenceDataByName[rec.name]) {
            referenceDataByName[rec.name] = { name: rec.name, lat: rec.lat, lon: rec.lon };
        }
    });

    if (allBounds.length) {
        map.fitBounds(allBounds, { padding: [24, 24] });
        map.setMaxBounds(MAP_BOUNDS);
    }

    updateStats();
    renderStations();
}

async function loadCsvData() {
    try {
        const response = await fetch(CSV_URL, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const csvText = await response.text();
        const rows = parseCsv(csvText);
        populateMap(rows);
    } catch (error) {
        console.warn("CSV indisponivel, usando fallback local.", error);
        populateMap(parseCsv(FALLBACK_CSV));
    }
}

function updateStats() {
    const stationCount = new Set(DATA.map((d) => d.name)).size;
    const layerCount = Object.keys(LAYER_COLORS).length;

    let visibleRecords = 0;
    Object.entries(groups).forEach(([layer, g]) => {
        if (map.hasLayer(g)) {
            visibleRecords += DATA.filter((d) => d.layer === layer).length;
        }
    });

    document.getElementById("nStations").textContent = stationCount;
    document.getElementById("nRecords").textContent = DATA.length;
    document.getElementById("nLayers").textContent = layerCount;
    document.getElementById("nVisible").textContent = visibleRecords;
}

function renderLayerFilter() {
    const wrap = document.getElementById("layerFilter");
    wrap.innerHTML = "<strong>Filtros de camada</strong>";

    Object.keys(LAYER_COLORS).forEach((layer) => {
        const row = document.createElement("label");
        row.className = "layer-item";

        const box = document.createElement("input");
        box.type = "checkbox";
        box.checked = layer === DEFAULT_LAYER;
        box.dataset.layer = layer;
        box.addEventListener("change", () => {
            if (box.checked) {
                groups[layer].addTo(map);
            } else {
                map.removeLayer(groups[layer]);
            }
            updateStats();
            renderStations();
        });

        const dot = document.createElement("span");
        dot.className = "swatch";
        dot.style.background = LAYER_COLORS[layer];

        const txt = document.createElement("span");
        txt.textContent = LAYER_LABELS[layer] || layer;

        row.appendChild(box);
        row.appendChild(dot);
        row.appendChild(txt);
        wrap.appendChild(row);
    });
}

function renderLegend() {
    const legend = document.getElementById("legend");
    legend.innerHTML = "<strong>Legenda de camadas</strong>";

    Object.keys(LAYER_COLORS).forEach((layer) => {
        const row = document.createElement("div");
        row.className = "legend-row";
        row.innerHTML = `<span class="swatch" style="background:${LAYER_COLORS[layer]}"></span><span>${LAYER_LABELS[layer] || layer}</span>`;
        legend.appendChild(row);
    });
}

function renderStations() {
    const list = document.getElementById("stationList");
    list.innerHTML = "<strong>Pontos de referencia</strong>";

    const unique = {};
    DATA.forEach((d) => {
        const key = d.name;
        if (!unique[key]) {
            unique[key] = { name: d.name, lat: d.lat, lon: d.lon };
        }
    });

    Object.entries(unique).forEach(([, info]) => {
        const card = document.createElement("div");
        card.className = "station";
        if (info.name === selectedReferenceName) {
            card.classList.add("selected");
        }
        card.innerHTML = `<h4>🚩 ${info.name}</h4><p>Ponto de referência local</p><p>${info.lat.toFixed(6)}, ${info.lon.toFixed(6)}</p>`;
        card.addEventListener("click", () => {
            selectedReferenceName = info.name;
            renderStations();
            map.setView([info.lat, info.lon], 17);
            showReferencePoint(info.name);
        });
        list.appendChild(card);
    });
}

function resetMap() {
    if (allBounds.length) {
        map.fitBounds(allBounds, { padding: [28, 28] });
    }
}

function toggleAll(on) {
    const boxes = document.querySelectorAll("#layerFilter input[type='checkbox']");
    boxes.forEach((box) => {
        box.checked = on;
        const layerKey = box.dataset.layer;
        if (layerKey) {
            if (on) {
                groups[layerKey].addTo(map);
            } else {
                map.removeLayer(groups[layerKey]);
            }
        }
    });

    updateStats();
    renderStations();
}

renderLayerFilter();
renderLegend();
loadCsvData();
</script>
</body>
</html>
